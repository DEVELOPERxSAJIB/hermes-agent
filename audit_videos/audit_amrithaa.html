<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Audit - Amrithaa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #fff; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .audit-card {
            width: 1200px; height: 675px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 16px; padding: 60px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        .audit-card::before {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, #44aa4422 0%, transparent 70%);
        }
        .header {
            display: flex; justify-content: space-between; align-items: flex-start;
            position: relative; z-index: 1;
        }
        .company-name {
            font-size: 42px; font-weight: 800; letter-spacing: -1px;
        }
        .score-badge {
            background: #44aa44; color: #fff;
            padding: 12px 24px; border-radius: 50px;
            font-size: 24px; font-weight: 800;
        }
        .url {
            font-size: 18px; color: #888; margin-top: 8px;
        }
        .issues-section {
            flex: 1; display: flex; gap: 40px; margin-top: 30px;
            position: relative; z-index: 1;
        }
        .issues-list {
            flex: 1; list-style: none;
        }
        .issues-list li {
            padding: 8px 0; padding-left: 28px; position: relative;
            font-size: 18px; color: #ddd; border-bottom: 1px solid #333;
        }
        .issues-list li::before {
            content: '\2717'; position: absolute; left: 0;
            color: #44aa44; font-weight: bold;
        }
        .right-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }
        .big-score {
            font-size: 120px; font-weight: 900; color: #44aa44;
            line-height: 1;
        }
        .score-label {
            font-size: 16px; color: #44aa44; text-transform: uppercase;
            letter-spacing: 3px; margin-top: 8px;
        }
        .footer {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #333; padding-top: 20px;
            position: relative; z-index: 1;
        }
        .brand {
            font-size: 24px; font-weight: 700; color: #fff;
        }
        .brand span { color: #4a9eff; }
        .cta-hint {
            font-size: 16px; color: #4a9eff;
        }
    </style>
</head>
<body>
    <div class="audit-card">
        <div class="header">
            <div>
                <div class="company-name">Amrithaa</div>
                <div class="url">https://amrithaa.com</div>
            </div>
            <div class="score-badge">MODERATE</div>
        </div>
        <div class="issues-section">
            <ul class="issues-list">
                <li>Site loads well - could use design refresh</li>
            </ul>
            <div class="right-panel">
                <div class="big-score">2/10</div>
                <div class="score-label">Website Score</div>
            </div>
        </div>
        <div class="footer">
            <div class="brand">Nano<span>Soft</span> Audit System</div>
            <div class="cta-hint">Personalized outreach opportunity</div>
        </div>
    </div>
</body>
</html>
